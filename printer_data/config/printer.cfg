# This file contains common pin mappings for the BigTreeTech Octopus
# and Octopus Pro boards. To use this config, start by identifying the
# micro-controller on the board - it may be an STM32F446, STM32F429,
# or an STM32H723.  Select the appropriate micro-controller in "make
# menuconfig" and select "Enable low-level configuration options". For
# STM32F446 boards the firmware should be compiled with a "32KiB
# bootloader" and a "12MHz crystal" clock reference. For STM32F429
# boards use a "32KiB bootloader" and an "8MHz crystal". For STM32H723
# boards use a "128KiB bootloader" and a "25Mhz crystal".

# See docs/Config_Reference.md for a description of parameters.

[include sensors.cfg]
[include KAMP_Settings.cfg]
[include motor_sync.cfg]
[include macros.cfg]
[include bedfans.cfg]
[include mainsail.cfg]
#[include sb_led.cfg]
[include speed_test.cfg]
#[include mesh.cfg]
#[include input_shaper.cfg]
[include speed.cfg]
[include tmcautotune.cfg]
[include shell_command.cfg]
[include shaketune.cfg]
#[include stridemax.cfg]
#[include chamber_heater.cfg]

[respond]

[exclude_object]

[gcode_arcs]
resolution: 0.1

[idle_timeout]
timeout: 7200

# driver 7
[stepper_x]
step_pin: PE6
dir_pin: !PA14
enable_pin: !PE0
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: PG6 #PG9
position_endstop: 310
position_max: 310
position_min: 0
homing_speed: 60
homing_retract_dist: 5
homing_positive_dir: true

[stepper_x1]
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200

# Driver6
[stepper_y]
step_pin: PE2
dir_pin: !PE3
enable_pin: !PD4
# step_pin: PG0
# dir_pin: !PG1
# enable_pin: !PF15
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: PG9 #PG6 
position_endstop: 320
position_max: 320
position_min: 0
homing_speed: 60
homing_retract_dist: 5
homing_positive_dir: true

[stepper_y1]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200

# Driver2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 4
#full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -5
homing_speed: 20
homing_retract_dist: 0


# Driver3
# The Octopus only has 4 heater outputs which leaves an extra stepper
# This can be used for a second Z stepper, dual_carriage, extruder co-stepper,
# or other accesory such as an MMU
[stepper_z1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA2
rotation_distance: 4
#full_steps_per_rotation: 200
microsteps: 16

# Driver4
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 4
#full_steps_per_rotation: 200


#[filament_switch_sensor material_0]
#switch_pin: PG12

#Driver5
[extruder]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
heater_pin: PA0
sensor_type: PT1000
sensor_pin: PF5
pullup_resistor: 4700
# spi_bus: spi3a
# spi_speed: 4000000
# spi_software_sclk_pin: PA5 #EXP2_2
# spi_software_mosi_pin: PA7 #EXP2_6
# spi_software_miso_pin: PA6 #EXP2_1
# rtd_use_50Hz_filter: True
# rtd_nominal_r: 1000
# rtd_reference_r: 4300
# rtd_num_of_wires: 2
microsteps: 16
gear_ratio: 50:8
rotation_distance: 21.577 #22.199057296 #21.3452474 #22.199057296
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 500
max_extrude_cross_section: 5
max_extrude_only_velocity: 120
pressure_advance: 0.036
#control: mpc
heater_power: 80  
cooling_fan: fan
filament_density: 1.20
filament_heat_capacity: 1.8
#block_heat_capacity: 28.4993
#sensor_responsiveness: 0.0870755
#ambient_transfer: 0.0895647
#fan_ambient_transfer: 0.0895647, 0.19642296, 0.20595985, 0.21175182, 0.21595981, 0.21928128, 0.22203301, 0.22438649, 0.22644532, 0.22827701
min_temp: 0
max_temp: 350

[verify_heater extruder]
