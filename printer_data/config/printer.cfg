[beacon]
contact_max_hotend_temperature: 180 # increase to probe at print temps
home_xy_position: 150, 135.6 # update with your safe position
home_z_hop: 5
home_z_hop_speed: 30
home_xy_move_speed: 300
home_y_before_x: True
home_method: proximity
home_method_when_homed: proximity
home_autocalibrate: never
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_A38D39D05154354D38202020FF0A352A-if00
x_offset: 0 # update with offset from nozzle on your machine
y_offset: -24.4 # update with offset from nozzle on your machine
mesh_main_direction: x
mesh_runs: 2
accel_axes_map: -x, -y, z

# [safe_z_home]
# home_xy_position: 143.5, 146 # update for your machine
# z_hop: 3
# speed: 150

[bed_mesh]
speed: 500
horizontal_move_z: 10
mesh_min: 16,20
mesh_max: 240,255
fade_start: 0.6
fade_end: 10.0
probe_count: 20, 20
algorithm: bicubic
zero_reference_position: 143.5, 146
adaptive_margin: 0

[z_tilt]
z_positions:
   -50, 18
   150, 348
   350, 18
points:
   40, 25
   158, 250
   270, 25
speed: 350
horizontal_move_z: 5
retries: 10
retry_tolerance: 0.0075


###DISPLAY#######################################
#################################################
[display]
##  mini12864 LCD Display
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
encoder_pins: ^EXP2_3, ^EXP2_5
click_pin: ^!EXP1_2
contrast: 63
spi_bus: spi1
# spi_software_miso_pin: PA6 #EXP2_1 
# spi_software_mosi_pin: PA7 #EXP2_6
# spi_software_sclk_pin: PA5 #EXP2_2

[neopixel fysetc_mini12864]
# #	To control Neopixel RGB in mini12864 display
pin: EXP1_6
chain_count: 3
initial_RED: 0.1
initial_GREEN: 0.5
initial_BLUE: 0.0
color_order: RGB

# #	Set RGB values on boot up for each Neopixel. 
# #	Index 1 = display, Index 2 and 3 = Knob
[delayed_gcode setdisplayneopixel]
initial_duration: 1
gcode:
        SET_LED LED=fysetc_mini12864 RED=1 GREEN=1 BLUE=1 INDEX=1 TRANSMIT=0
        SET_LED LED=fysetc_mini12864 RED=1 GREEN=0 BLUE=0 INDEX=2 TRANSMIT=0
        SET_LED LED=fysetc_mini12864 RED=1 GREEN=0 BLUE=0 INDEX=3 

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE8, EXP1_2=PE7,
    EXP1_3=PE9, EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,    # Slot in the socket on this side
    EXP1_7=PE14, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PB1, EXP2_4=PA4,
    EXP2_5=PB2, EXP2_6=PA7,      # Slot in the socket on this side
    EXP2_7=PC15, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=PC5

