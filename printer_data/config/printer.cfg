[heater_bed]
heater_pin: PB11
sensor_pin: PF4 # TB
sensor_type: Generic 3950
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
min_temp: 0
max_temp: 130

[heater_generic chamber_heater]
# sensor_type: NTC 100K MGB18-104F39050L32
# sensor_pin: PF5
sensor_type: temperature_combined
sensor_list: temperature_sensor Chamber_high, temperature_sensor Chamber_mid
#   Must be provided. List of sensors to combine to new "virtual"
#   sensor.
#   E.g. 'temperature_sensor sensor1,extruder,heater_bed'
combination_method: mean
#   Must be provided. Combination method used for the sensor.
#   Available options are 'max', 'min', 'mean'.
maximum_deviation: 999.9
#   Must be provided. Maximum permissible deviation between the sensors
#   to combine (e.g. 5 degrees). To disable it, use a large value (e.g. 999.9)
gcode_id: C
heater_pin: PD15
max_power: 1
min_temp: 0
max_temp: 90
control: pid
# pid_kp: 25.418
# pid_ki: 2.999
# pid_kd: 53.854
# pid_Kp:63.418 
# pid_Ki:1.342 
# pid_Kd:749.125
pid_Kp: 70.184
pid_Ki: 0.376
pid_Kd: 3274.071

[controller_fan chamber_fan]
pin: PD14
heater: chamber_heater
idle_timeout: 60
stepper:

[verify_heater chamber_heater]
hysteresis: 3
check_gain_time: 500
heating_gain: .1
check_gain_time:600
max_error: 500



# [multi_pin part_fans]
# pins: PA8, PE5

[fan]
pin: PB10
max_power: 1.0
kick_start_time: 0.5
hardware_pwm: True
cycle_time: 0.0005   # 2 kHz PWM frequency
shutdown_speed: 0
# pin: multi_pin:part_fans
# max_power: 1.0
# cycle_time: 0.01
# kick_start_time: 0.5                
# ##	Depending on your fan, you may need to increase this value
# ##	if your fan will not start. Can change cycle_time (increase)
# ##	if your fan is not able to slow down effectively
# off_below: 0 

[multi_pin bay_fans]
pins: PD12, PD13

[controller_fan my_controller_fan]
pin: multi_pin:bay_fans
max_power: 1
shutdown_speed: 0
#cycle_time:
#hardware_pwm:
kick_start_time: 0.5
fan_speed: 1.0
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when a heater or stepper driver is active.
#   The default is 1.0
#idle_timeout:
#   The amount of time (in seconds) after a stepper driver or heater
#   was active and the fan should be kept running. The default
#   is 30 seconds.
#idle_speed:
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when a heater or stepper driver was active and
#   before the idle_timeout is reached. The default is fan_speed.
heater: heater_bed, extruder, chamber_heater
stepper: stepper_x, stepper_y
#   Name of the config section defining the heater/stepper that this fan
#   is associated with. If a comma separated list of heater/stepper names
#   is provided here, then the fan will be enabled when any of the given
#   heaters/steppers are enabled. The default heater is "extruder", the
#   default stepper is all of them.

[heater_fan hotend]
pin: PE5
max_power: 1.0
#shutdown_speed:
#cycle_time:
#hardware_pwm:
#kick_start_time:
#min_power:
#tachometer_pin:
#tachometer_ppr:
#tachometer_poll_interval:
#enable_pin:
#initial_speed:
#   See the "fan" section for a description of the above parameters.
heater: extruder
#   Name of the config section defining the heater that this fan is
#   associated with. If a comma separated list of heater names is
#   provided here, then the fan will be enabled when any of the given
#   heaters are enabled. The default is "extruder".
heater_temp: 50.0
#   A temperature (in Celsius) that the heater must drop below before
#   the fan is disabled. The default is 50 Celsius.
fan_speed: 1.0
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when its associated heater is enabled. The default
#   is 1.0

